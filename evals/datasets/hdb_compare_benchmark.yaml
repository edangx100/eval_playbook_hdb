# Agent must relax at least once.
# Verified initial counts below 30; after relaxing, expect 30–200.
# sparse_001 uses short months_back (3 months) to force under-count.
# sparse_002 uses rare area (Bukit Timah 4-room: only 32 total rows in 24mo).
