# ============================================================
# MULTI-TURN CASES (6)
# 2-turn conversations: turn 2 refines without restating turn 1 context.
# All turns ≥ 2 have expected_target_delta with updated and preserved keys.
# All cases preserve town and/or flat_type across turns.
# ============================================================

- id: multiturn_001
  category: multi_turn
  turns:
    - query: "Find 4-room flats in Sengkang, last 12 months"
      expected_target:
        town: "SENGKANG"
        flat_type: "4 ROOM"
        months_back: 12
      expected_count_range:
        min: 30
        max: 500
      checks:
        - target_extraction
        - retrieval_quality
    - query: "Actually I want mid floor, around 90 sqm"
      expected_target_delta:
        updated:
          floor_area_target: 90.0
          storey_preference: "mid"
        preserved:
          - town
          - flat_type
          - months_back
      expected_count_range:
        min: 30
        max: 200
      checks:
        - target_extraction
        - retrieval_quality

