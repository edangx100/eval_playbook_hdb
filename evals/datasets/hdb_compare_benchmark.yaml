# ============================================================
# PLANNER FALLBACK STRESS CASES (3)
# Queries crafted to induce LLM planner non-conformance.
# All use months_back > 36 combined with a rare flat_type.
# Data only covers 20 months (2024-05 to 2026-01), so months_back > 36
# returns 0 initial results, forcing repeated relax iterations.
# Under multiple forced iterations, the LLM may produce invalid
# PlannerDecision responses, triggering the deterministic fallback path.
# ============================================================

- id: fallback_001
  category: fallback_stress
  query: "Find 1-room flat in Toa Payoh, last 48 months"
  expected_target:
    town: "TOA PAYOH"
    flat_type: "1 ROOM"
    months_back: 48
  expected_count_range:
    min: 0
    max: 50
  checks:
    - target_extraction
    - planner_decision
    - trace_quality

