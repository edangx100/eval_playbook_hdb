# HDB Compare Agents — Benchmark Dataset
# 38 test cases across 8 categories
# Data range in DB: 2024-05-01 to 2026-01-01 (43,908 rows with embeddings)
# Counts verified against live DB on 2026-05-26
# expected_count_range reflects the FINAL count after the planner loop exits

# ============================================================
# EASY / HAPPY-PATH CASES (8)
# Well-specified queries: town + flat_type + area + time window.
# Agent should accept in ≤ 2 planner steps with count in 30–200.
# Verified initial counts: 
# AMK 4-room 9mo ±5sqm ≈171, 
# Bishan 4-room 12mo ≈54,
# Serangoon 4-room 12mo ≈167, 
# Tampines 5-room 6mo ±5sqm ≈72,
# Marine Parade 3-room 18mo ≈129, 
# Bishan 5-room 18mo ≈142,
# Pasir Ris EXEC 12mo ≈134, 
# Sengkang 3-room 12mo ≈135.
# ============================================================

- id: easy_001
  category: easy
  query: "Find 4-room flat in Ang Mo Kio, around 93 sqm, mid floor, last 9 months"
  expected_target:
    town: "ANG MO KIO"
    flat_type: "4 ROOM"
    floor_area_target: 93.0
    storey_preference: "mid"
    months_back: 9
  expected_count_range:
    min: 30
    max: 200
  checks:
    - target_extraction
    - retrieval_quality
    - planner_decision
    - trace_quality
    - reranking_quality
    - llm_judge

