# ============================================================
# STREET HINT CASES (5)
# Queries containing "near X" or a specific street name.
# Must trigger hybrid retrieval mode.
# Verified approximate counts (street-filtered, 18mo):
# Fernvale Rd Sengkang ≈127,
# Tampines St 45 ≈38,
# Ghim Moh Rd ≈64,
# Compassvale Link ≈89,
# Tampines Nth Dr 1 ≈145.
#
# NOTE on street_hint values: these use the full user-typed form (e.g. "Fernvale Road",
# "Tampines Street 45") rather than DB-abbreviated forms ("FERNVALE RD", "TAMPINES ST 45").
# The Target Agent returns what the user said, not the DB abbreviation, so expectations
# must match agent output. Retrieval is unaffected: the ILIKE %hint% query does substring
# matching, so unabbreviated forms resolve correctly against DB street names.
# ============================================================

- id: street_001
  category: street_hint
  query: "4-room flat near Fernvale Road in Sengkang, last 18 months"
  expected_target:
    town: "SENGKANG"
    flat_type: "4 ROOM"
    street_hint: "Fernvale Road"
    months_back: 18
  expected_retrieval_mode: hybrid
  expected_count_range:
    min: 10
    max: 200
  checks:
    - target_extraction
    - retrieval_mode
    - retrieval_quality

